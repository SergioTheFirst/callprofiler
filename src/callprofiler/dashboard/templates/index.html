<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallProfiler Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="header-left">
            <h1>CallProfiler</h1>
            <span class="subtitle">Pipeline Monitor</span>
        </div>
        <div class="header-stats" id="header-stats">
            <div class="stat-box"><span class="stat-num" id="s-calls">--</span>звонков</div>
            <div class="stat-box"><span class="stat-num" id="s-entities">--</span>персонажей</div>
            <div class="stat-box"><span class="stat-num" id="s-portraits">--</span>портретов</div>
            <div class="stat-box risk"><span class="stat-num" id="s-risk">--</span>ср.риск</div>
        </div>
        <div class="header-right">
            <button id="btn-shutdown" onclick="doShutdown()" title="Stop server">SHUTDOWN</button>
            <span id="connection-dot" class="dot disconnected"></span>
            <span id="connection-text">connecting...</span>
        </div>
    </header>

    <!-- Main layout -->
    <main>
        <!-- LEFT: Live Feed -->
        <section id="live-feed">
            <div class="section-header">
                <h2>Живая лента</h2>
                <span id="feed-count">0 событий</span>
            </div>
            <div id="feed-container"></div>
        </section>

        <!-- RIGHT: Entity Profile -->
        <section id="entity-panel">
            <div class="section-header">
                <h2>Профиль</h2>
                <span id="entity-close" style="cursor:pointer;display:none">✕</span>
            </div>
            <div id="entity-placeholder">Кликните на имя в ленте чтобы увидеть профиль</div>
            <div id="entity-content" style="display:none"></div>
        </section>
    </main>

    <!-- Entity modal (click contact name) -->
    <div id="modal-overlay" style="display:none">
        <div id="modal">
            <div id="modal-header">
                <h2 id="modal-name"></h2>
                <button id="modal-close">✕</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
