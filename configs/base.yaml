data_dir: "C:\\calls\\data"
log_file: "C:\\calls\\callprofiler.log"   # весь отчёт о запуске (лог + стадии + ошибки)

models:
  # ── ASR ──────────────────────────────────────────────────────────────
  asr_backend: "gigaam"            # "whisper" | "gigaam"
  gigaam_model_dir: "C:\\models\\GigaAM-v3-rnnt"   # локальная HF-модель
  gigaam_device: "cuda"
  gigaam_chunk_sec: 20             # окно нарезки (<25с — ограничение модели)
  gigaam_overlap_sec: 0.0          # 0 = без дублей на стыках окон
  gigaam_url: ""                   # legacy HTTP (не используется локальной моделью)
  # Whisper больше не используется (оставлено для отката asr_backend: whisper)
  whisper: "large-v3"
  whisper_device: "cuda"
  whisper_compute: "float16"
  whisper_beam_size: 5
  whisper_language: "ru"
  # ── LLM ──────────────────────────────────────────────────────────────
  llm_model: "local"
  llm_url: "http://127.0.0.1:8080/v1/chat/completions"

pipeline:
  watch_interval_sec: 30
  file_settle_sec: 10
  max_retries: 3
  retry_interval_sec: 3600
  text_export_dir: "C:\\calls\\text"     # читабельный .txt транскрипт (имя = имя исходника)
  remove_source_on_success: true          # убрать исходник из incoming после транскрибации
  batch_chunk_size: 100                    # партия в process_pending (RAM/resume на больших прогонах)
  delete_normalized_after_transcribe: true # удалять normalized .wav после stage 2 (экономия диска на 17k)
  insight_autofit: true                    # авто-fit архетипов в watch-цикле (numpy, GPU не трогает)
  insight_autofit_min_new: 25              # порог: новых терминальных звонков для пере-fit
  insight_autofit_min_interval_sec: 1800   # debounce: не чаще раза в 30 минут

audio:
  sample_rate: 16000
  channels: 1
  format: "wav"

hf_token: "${HF_TOKEN}"
