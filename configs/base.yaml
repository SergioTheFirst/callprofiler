data_dir: "C:\\calls\\data"
log_file: "C:\\calls\\data\\logs\\pipeline.log"

models:
  whisper: "large-v3"
  whisper_device: "cuda"
  whisper_compute: "float16"
  whisper_beam_size: 5
  whisper_language: "ru"
  llm_model: "local"
  llm_url: "http://127.0.0.1:8080/v1/chat/completions"
  asr_backend: "whisper"   # switch to "gigaam" when gigaam_url is set
  gigaam_url: ""            # e.g. "http://127.0.0.1:8090"

pipeline:
  watch_interval_sec: 60
  file_settle_sec: 10
  max_retries: 3
  retry_interval_sec: 3600

audio:
  sample_rate: 16000
  channels: 1
  format: "wav"

hf_token: "${HF_TOKEN}"  # "TOKEN"
