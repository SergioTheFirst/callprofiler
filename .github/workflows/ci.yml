name: CI

on:
  push:
    branches: [ main, claude/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg ffprobe

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov flake8 ruff

    - name: Lint with flake8
      run: |
        # Stop build on syntax errors or undefined names
        flake8 src/callprofiler tests \
          --count \
          --select=E9,F63,F7,F82 \
          --show-source \
          --statistics
        # Exit-zero treats all errors as warnings
        flake8 src/callprofiler tests \
          --count \
          --exit-zero \
          --max-line-length=100 \
          --extend-ignore=E203,W503 \
          --statistics

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short

    - name: Generate coverage report
      run: |
        pytest tests/ \
          --cov=src/callprofiler \
          --cov-report=xml \
          --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true

    - name: Test import of main package
      run: |
        python -c "from src.callprofiler import config, models; print('✓ Package imports OK')"

  security-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Check for hardcoded secrets
      run: |
        # Scan for common secret patterns
        if grep -r "TOKEN" src/ --include="*.py" | grep -v "hf_token" | grep -v "HF_TOKEN" | grep -v "use_auth_token" | grep -v "use_auth_token="; then
          echo "⚠ Warning: Possible hardcoded tokens found (check manually)"
        else
          echo "✓ No obvious hardcoded secrets"
        fi

    - name: Validate CONSTITUTION.md
      run: |
        if [ -f CONSTITUTION.md ] && grep -q "merge-blocking" CONSTITUTION.md; then
          echo "✓ CONSTITUTION.md exists and is marked merge-blocking"
        else
          echo "⚠ Warning: CONSTITUTION.md not found or not marked merge-blocking"
        fi

    - name: Verify critical files
      run: |
        files=("README.md" "CLAUDE.md" "CONSTITUTION.md" "CONTINUITY.md" "CHANGELOG.md")
        for file in "${files[@]}"; do
          if [ -f "$file" ]; then
            echo "✓ $file"
          else
            echo "✗ Missing: $file"
            exit 1
          fi
        done

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff

    - name: Run ruff check
      run: |
        ruff check src/callprofiler tests || true

    - name: Check Python syntax
      run: |
        python -m py_compile src/callprofiler/*.py
        find src/callprofiler -name "*.py" -exec python -m py_compile {} +
        echo "✓ Syntax check passed"

  summary:
    runs-on: ubuntu-latest
    needs: [test, security-check, code-quality]
    if: always()
    steps:
    - name: Check job status
      run: |
        if [ "${{ needs.test.result }}" = "success" ] && \
           [ "${{ needs.security-check.result }}" = "success" ] && \
           [ "${{ needs.code-quality.result }}" = "success" ]; then
          echo "✓✓✓ All CI checks PASSED ✓✓✓"
          exit 0
        else
          echo "✗ Some CI checks failed"
          exit 1
        fi
